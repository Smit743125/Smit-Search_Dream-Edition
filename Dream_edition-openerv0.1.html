<style>

/* =====================Background========================= */
body{
    margin:0;
    height:100vh;
    overflow:hidden;

    background:#000;

    display:flex;
    flex-direction:column;

    font-family:"Exo",sans-serif;
}


.h1 {
    color:white;
    font-size:4rem;
    letter-spacing:5px;
    white-space:nowrap;   /* ADD THIS */

    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);

    z-index:2;

    opacity:0;

    animation:titleJourney 3s ease forwards;
}
/* .homecontainer{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:2;
} */

.dream-btn{
    position: fixed;
    bottom: 20px;
    left: 20px;

    width: 48px;
    height: 48px;
    text-align: center;

    display: flex;
    justify-content: center;
    align-items: center;

    border-radius: 50px;
    border: 2px solid #fff;

    background: transparent;
    color: white;

    font-size: 15px;
    font-weight: bold;

    cursor: pointer;
    overflow: hidden;

    backdrop-filter: blur(5px);

    z-index: 1;
    transition: 0.5s;
}


/* RGB BORDER */
.dream-btn::before{

    content: "";
    position: absolute;
    top: -2px;
    left: -2px;
    width: calc(100% + 4px);
    height: calc(100% + 4px);
    border-radius: 50px;

    background: linear-gradient(
        90deg,
        #8b5cf6,
        #a78bfa,
        #93c5fd,
        #c4b5fd,
        #8b5cf6
    );

    background-size: 300%;
    z-index: -2;
    animation: rgbMove2 6s linear infinite;
}


/* INNER LAYER */
.dream-btn::after{

    content: "";
    position: absolute;
    top: 2px;
    left: 2px;
    width: calc(100% - 4px);
    height: calc(100% - 4px);
    border-radius: 50px;
    background: transparent;
    z-index: -1;
}


/* RGB MOVEMENT */
@keyframes rgbMove2{

    0%{
        background-position: 600%;
    }
    100%{
        background-position: 0%;
    }
}







/* Stars */

.stars{
    position:fixed;
    inset:0;

    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(white 2px, transparent 2px);

    background-size:
    120px 120px,
    180px 180px,
    250px 250px;

    background-position:
    0 0,
    50px 80px,
    100px 40px;

    opacity:0.8;

    z-index:0;
}

/* Title */

.title{

    color:white;
    font-size:4rem;
    letter-spacing:5px;
    white-space:nowrap;   /* ADD THIS */
    position:fixed;
    
    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:2;

    opacity:0;

    animation:titleJourney 3s ease forwards;
}

@keyframes titleJourney{

    0%{
        opacity:0;
        top:40%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:4rem;
    }

    20%{
        opacity:1;
        top:40%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:4rem;
    }

    55%{
        opacity:1;
        top:40%;
        left:50%;
        transform:translate(-50%,-50%);
        font-size:4rem;
    }

    85%{
        opacity:1;

        top:25px;
        left:30px;

        transform:none;

        font-size:2rem; 
    }

    100%{
        opacity:1;

        top:25px;
        left:30px;

        transform:none;

        font-size:2rem; /* shrink only after arrival */
    }

}

/* Button */

.enter-btn{

    margin-top:40px;
    width:180px;
    height:55px;
    border:none;
    border-radius:50px;
    background:white;
    color:black;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    position:relative;
    z-index:2;
    opacity:0;
    animation:buttonRise 1.5s ease forwards;
    animation-delay:0.8s;
}

@keyframes buttonRise{

    from{
        opacity:0;
        transform:translateY(150px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

// ===== PARTICLE INPUT =====

const particleInput =
document.getElementById("particleCount");

const warning =
document.getElementById("particleWarning");

particleInput.value =
localStorage.getItem("particleCount")
|| 30;

updateParticleInfo();

particleInput.addEventListener(
"input",
() => {

    localStorage.setItem(
        "particleCount",
        particleInput.value
    );

    updateParticleInfo();

});

    function updateParticleInfo(){

    const value =
    parseInt(
        particleInput.value
    );

    if(value <= 30){

        warning.textContent =
        "Load: Low";

    }else if(value <= 65){

        warning.textContent =
        "Load: Normal";

    }else if(value <= 120){

        warning.textContent =
        "Load: High";

    }else if(value <= 200){

        warning.textContent =
        "Load: Extream";

    }else if(value <= 1500){

        warning.textContent =
        "Load: Extreamly Heavy";

    }else if(value <= 100000){

        warning.textContent =
        "Load: Ultra";

    }else{

        warning.textContent =
        "Load: None";
    }

}
