.moon{

@keyframes moonCycle {

    /* 🌞 hidden during day */
    0% {
        left: -10%;
        top: 80%;
        opacity: 0;
    }

    42% {
        opacity: 0;
    }

    /* 🌙 moonrise starts EARLIER */
    45% {
        left: -10%;
        top: 80%;
        opacity: 0;
    }

    /* 🌌 appears faster */
    50% {
        opacity: 1;
    }

    /* 🌕 reaches peak sooner */
    60% {
        left: 50%;
        top: 5%;
        opacity: 0.8;
    }

    /* 🌙 starts leaving earlier */
    72% {
         left: 72%;  /*72 */
        top: 5%;   /*25 */
        opacity: 0.6;
    }

    /* 🌌 fading before dawn */
    80% {
        left: 100%;  /*88 */
        top: 42%;   /*55 */
        opacity: 0.2;
    }

    /* 🌅 fully gone BEFORE morning */
    100% {
        left: 110%;
        top: 55%;
        opacity: 0;
    }
}

@keyframes sunCycle {

.morning-day{

  20%  { opacity: 1; }
  30%  { opacity: 0; }
  100% { opacity: 0; }
}

/* ================= DAY - EVENING ================= */
.day-evening{
    width: 100%;
    height: 100%;
    background: linear-gradient(

    z-index: -3;
    transition: opacity 2.5s ease-in-out;

  0%   { opacity: 0; }
  10%  { opacity: 1; }
  20%  { opacity: 1; }
  30%  { opacity: 0; }
  100% { opacity: 0; }
}

/* ================================= CLOCK ================================= */

function updateClock() {

    const now = new Date();

    let hours = now.getHours();

    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const ampm = hours >= 12 ? 'OF Evening' : 'OF Morning';

    hours = hours % 12;
    hours = hours ? hours : 12;

    document.getElementById('clock').textContent =
    `${hours}:${minutes}:${seconds}`;

    document.getElementById('time-status').textContent =
    ampm;
}

setInterval(updateClock, 1000);
updateClock();




/* ================================= ENVIRONMENT ================================= */

const TEST_MODE = false;

let fakeTime = 4;

function updateEnvironment() {

    let currentTime;

    if(TEST_MODE){

        currentTime = fakeTime;

    }else{

        const now = new Date();

        currentTime =
            now.getHours() +
            now.getMinutes() / 60 +
            now.getSeconds() / 3600;
    }
    
const sunrise = 4;
const sunset = 18.25;

let progress =
    (currentTime - sunrise) /
    (sunset - sunrise);

progress =
    Math.max(0, Math.min(progress, 1));

    const sun = document.querySelector(".sun");
    const moon = document.querySelector(".moon");

    const morningDay =
        document.querySelector(".morning-day");

    const dayEvening =
        document.querySelector(".day-evening");

    const eveningNight =
        document.querySelector(".evening-night");

    const nightDeep =
        document.querySelector(".night-deep");

    const nightMorning =
        document.querySelector(".night-morning");


    // RESET SKY

    morningDay.style.opacity = "0";
    dayEvening.style.opacity = "0";
    eveningNight.style.opacity = "0";
    nightDeep.style.opacity = "0";
    nightMorning.style.opacity = "0";


    // =========================
    // SKY STATES
    // =========================

if(progress < 0.10){

    nightMorning.style.opacity = "1";

}
else if(progress < 0.55){

    morningDay.style.opacity = "1";

}
else if(progress < 0.80){

    dayEvening.style.opacity = "1";

}
else if(progress < 1){

    eveningNight.style.opacity = "1";

}
else{

    nightDeep.style.opacity = "1";

}


    // =========================
    // SUN SYSTEM
    // 4:00 → 18:15
    // =========================


    if(currentTime >= sunrise &&
       currentTime <= sunset){

        const progress =
            (currentTime - sunrise) /
            (sunset - sunrise);

        const angle =
            progress * Math.PI;

        const x =
            5 + progress * 90;

        const y =
            80 - Math.sin(angle) * 75;

        sun.style.left = `${x}%`;
        sun.style.top = `${y}%`;

        sun.style.opacity = "1";

        const glow =
            Math.sin(angle);

        sun.style.boxShadow =
            `0 0 ${60 + glow * 120}px rgba(255,221,0,${0.5 + glow * 0.5})`;

    }

    else{

        sun.style.opacity = "0";

        sun.style.left = "5%";
        sun.style.top = "80%";

    }


    // =========================
    // MOON SYSTEM
    // 18:40 → 04:00
    // =========================

    const moonrise = 18.67;
    const moonset = 28;

    let moonTime =
        currentTime;

    if(moonTime < 4){

        moonTime += 24;

    }

    if(moonTime >= moonrise &&
       moonTime <= moonset){

        const moonProgress =
            (moonTime - moonrise) /
            (moonset - moonrise);

        const angle =
            moonProgress * Math.PI;

        const x =
            5 + moonProgress * 90;

        const y =
            80 - Math.sin(angle) * 75;

        moon.style.left = `${x}%`;
        moon.style.top = `${y}%`;

        moon.style.opacity = "0.8";

    }

    else{

        moon.style.opacity = "0";

        moon.style.left = "5%";
        moon.style.top = "80%";

    }
}

updateEnvironment();

setInterval(() => {

    if(TEST_MODE){

        fakeTime += 0.4;

        if(fakeTime >= 24){

}, 1000);



/* ================= TYPING PLACEHOLDER EFFECT ================= */

const placeholders = [

    "Just Search it on Google...",
    "Wanna scroll reels? YouTube Here!...",
    "upload your project using GitHub...",
    "Ask ChatGPT...",
    "What's going on Instagram...",
    "Message on WhatsApp..."

];

const searchBox = document.getElementById("SearchBox");

let textIndex = 0;
let charIndex = 0;
let isDeleting = false;

function typeEffect() {

    let currentText = placeholders[textIndex];

    if(isDeleting){
        searchBox.placeholder =
        currentText.substring(0, charIndex--);

    }

    else {
        searchBox.placeholder =
        currentText.substring(0, charIndex++);
    }

    let speed = isDeleting ? 150 : 125;

    /* typing finished */
    if(!isDeleting && charIndex === currentText.length + 1){

        speed = 1500;
        isDeleting = true;
    }

    /* deleting finished */
    else if(isDeleting && charIndex === 0){

        isDeleting = false;
        textIndex++;
        if(textIndex >= placeholders.length){
            textIndex = 0;
        }

        speed = 400;
    }
    setTimeout(typeEffect, speed);
}

function createParticles() {

    === "true";

        particleContainer.innerHTML = "";
        return;
    }

    particleContainer.innerHTML = "";

    ) || 30;

        const p =
        document.createElement("div");

        p.classList.add("particle");

        Math.random() * 5 + 2;

        p.style.left =
        Math.random() * 100 + "vw";

        p.style.top =
        Math.random() * 100 + "vh";

        p.style.animation =
        `floatUp ${Math.random() * 5 + 3}s linear infinite`;

        Math.random() * 1.5 + 2;

    opacity = 0.8;
}

    const brightness =

    const angle =
        Math.random() * 8 - 4;

    drop.style.height = height + "px";
    drop.style.width = width + "px";
    drop.style.opacity = opacity;
    const blue =
    Math.floor(
    Math.random()*30+220
    );

    drop.style.filter =
    `blur(${Math.random()*1.2}px)`;

        duration + "s";

        drop.remove();

    }, duration * 1000);
}
