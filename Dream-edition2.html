/* ================================================ Background ================================================= */


.moon{
    width: 120px;
    height: 120px;
    border-radius: 50%;
    position: absolute;

    background: radial-gradient(circle at center,
    #f5f5f5,
    #d9d9d9,
    #a6a6a6);

    box-shadow: 0 0 40px rgba(255,255,255,0.8);
    opacity: 0;
}


@keyframes moonCycle {

    /* 🌞 hidden during day */
    0% {
        left: -10%;
        top: 80%;
        opacity: 0;
    }

    42% {
        opacity: 0;
    }

    /* 🌙 moonrise starts EARLIER */
    45% {
        left: -10%;
        top: 80%;
        opacity: 0;
    }

    /* 🌌 appears faster */
    50% {
        opacity: 1;
    }

    /* 🌕 reaches peak sooner */
    60% {
        left: 50%;
        top: 5%;
        opacity: 0.8;
    }

    /* 🌙 starts leaving earlier */
    72% {
         left: 72%;  /*72 */
        top: 5%;   /*25 */
        opacity: 0.6;
    }

    /* 🌌 fading before dawn */
    80% {
        left: 100%;  /*88 */
        top: 42%;   /*55 */
        opacity: 0.2;
    }

    /* 🌅 fully gone BEFORE morning */
    100% {
        left: 110%;
        top: 55%;
        opacity: 0;
    }
}



.sun{
    width: 150px;
    height: 150px;
    border-radius: 50%;
    box-shadow: 0 0 50px rgba(255, 221, 0, 20);
    position: absolute;
    background: radial-gradient(circle at center, #ffdd00, #ff9900);
}

@keyframes sunCycle {

    /* 🌅 sunrise */
    0% {
        left: -10%;
        top: 90%;
        opacity: 0;
    }

    /* 🌞 appears smoothly */
    5% {
        opacity: 1;
    }

    /* ☀️ reaches center at 12s */
    20% {
        left: 50%;
        top: 5%;
        opacity: 0.7;
    }

    /* 🌇 keeps SAME SPEED downward */
    35% {
        left: 70%;
        top: 25%;
        opacity: 0.5;
    }

    /* 🌇 near sunset */
    45% {
        left: 85%;
        top: 55%;
        opacity: 0;
    }
    47% {
        opacity: 0;
    }
    /* 🌙 gone before night */
    50% {
        opacity: 0;
        left: 110%;
        top: 80%;
    }

    100% {
        opacity: 0;
    }
}
/* ================= MORNING - DAY ================= */
.morning-day{
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to bottom,
        #87CEEB,
        #BFE9FF,
        #EAF8FF
    );

    top: 0;
    left: 0;
    z-index: -2;
    transition: opacity 2.5s ease-in-out;
}

@keyframes morningDayTransition {
  0%   { opacity: 0; }
  10%  { opacity: 1; }
  20%  { opacity: 1; }
  30%  { opacity: 0; }
  100% { opacity: 0; }
}

/* ================= DAY - EVENING ================= */
.day-evening{
    width: 100%;
    height: 100%;
    background: linear-gradient(
        to bottom,

        #DDF4FF

    left: 0;
    z-index: -3;

}

  20%  { opacity: 1; }
  30%  { opacity: 0; }
  100% { opacity: 0; }
}

.evening-night{
    width: 100%;

    z-index: -4;

}

  20%  { opacity: 1; }
  30%  { opacity: 0; }
  100% { opacity: 0; }
}

/* ================= DEEP NIGHT ================= */
.night-deep{
    width: 100%;
    height: 100%;
    background: linear-gradient(

    );

}

/* ================================= CLOCK ================================= */

function updateClock() {

    const now = new Date();

    let hours = now.getHours();

    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');

    const ampm = hours >= 12 ? 'OF Evening' : 'OF Morning';

    hours = hours % 12;
    hours = hours ? hours : 12;

    document.getElementById('clock').textContent =
    `${hours}:${minutes}:${seconds}`;

    document.getElementById('time-status').textContent =
    ampm;
}

setInterval(updateClock, 1000);
updateClock();


/* ================================= ENVIRONMENT ================================= */

function updateEnvironment() {

    const now = new Date();
    const hours = now.getHours();

    const sun = document.querySelector('.sun');
    const moon = document.querySelector('.moon');

    const morningDay = document.querySelector('.morning-day');
    const dayEvening = document.querySelector('.day-evening');
    const eveningNight = document.querySelector('.evening-night');
    const nightDeep = document.querySelector('.night-deep');
    const nightMorning = document.querySelector('.night-morning');

    /* RESET */
    sun.style.opacity = '0';
    moon.style.opacity = '0';

    morningDay.style.opacity = '0';
    dayEvening.style.opacity = '0';
    eveningNight.style.opacity = '0';
    nightDeep.style.opacity = '0';
    nightMorning.style.opacity = '0';

    /* 🌄 DAWN */
    if(hours >= 4 && hours < 6){
        nightMorning.style.opacity = '1';

        moon.style.opacity = '0.3';
        moon.style.left = '80%';
        moon.style.top = '15%';
    }

    /* 🌅 MORNING */
    else if(hours >= 6 && hours < 12){
        morningDay.style.opacity = '1';

        sun.style.opacity = '1';
        sun.style.left = '20%';
        sun.style.top = '20%';
    }

    /* ☀️ DAY */
    else if(hours >= 12 && hours < 17){
        dayEvening.style.opacity = '1';

        sun.style.opacity = '1';
        sun.style.left = '50%';
        sun.style.top = '5%';
    }

    /* 🌇 EVENING */
    else if(hours >= 17 && hours < 19){
        eveningNight.style.opacity = '1';

        sun.style.opacity = '1';
        sun.style.left = '80%';
        sun.style.top = '30%';
    }

    /* 🌙 NIGHT */
    else {
        nightDeep.style.opacity = '1';

        moon.style.opacity = '0.7';
        moon.style.left = '50%';
        moon.style.top = '10%';
    }
}

setInterval(updateEnvironment, 1000);
updateEnvironment();

/* ================= TYPING PLACEHOLDER EFFECT ================= */

const placeholders = [

    "Just Search it on Google...",
    "Wanna scroll reels? YouTube Here!...",
    "upload your project using GitHub...",
    "Ask ChatGPT...",
    "What's going on Instagram...",
    "Message on WhatsApp..."

];

const searchBox = document.getElementById("SearchBox");

let textIndex = 0;
let charIndex = 0;
let isDeleting = false;

function typeEffect() {

    let currentText = placeholders[textIndex];

    if(isDeleting){
        searchBox.placeholder =
        currentText.substring(0, charIndex--);

    }

    else {
        searchBox.placeholder =
        currentText.substring(0, charIndex++);
    }

    let speed = isDeleting ? 150 : 125;

    /* typing finished */
    if(!isDeleting && charIndex === currentText.length + 1){

        speed = 1500;
        isDeleting = true;
    }

    /* deleting finished */
    else if(isDeleting && charIndex === 0){

        isDeleting = false;
        textIndex++;
        if(textIndex >= placeholders.length){
            textIndex = 0;
        }

        speed = 400;
    }
    setTimeout(typeEffect, speed);
}

typeEffect();

// ............==============Weather API and all stuff............==============

const apiKey = "2c65bda0e381c8129f371f11cf8f74c2";

async function getWeather() {

    const city = "Kolkata";

    const url =
    `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`;

    const response = await fetch(url);

    const data = await response.json();

    console.log(data);

    if(data.main){

        document.getElementById("temp").textContent =
        Math.round(data.main.temp) + "°C";

        document.getElementById("city").textContent =
        data.name;

        document.getElementById("condition").textContent =
        data.weather[0].main;

    }

    else{

        console.log("API ERROR:", data.message);

    }
}

getWeather();

// ================= PARTICLE SYSTEM =================

const particleContainer =
document.querySelector(".particles");

function createParticles() {

    const particlesEnabled =
    localStorage.getItem("particlesEnabled")
    === "true";

    if (!particlesEnabled) {

        particleContainer.innerHTML = "";
        return;
    }

    particleContainer.innerHTML = "";

    for (let i = 0; i < 50; i++) {

        const p =
        document.createElement("div");

        p.classList.add("particle");

        const size =
        Math.random() * 5 + 2;

        p.style.width =
        size + "px";

        p.style.height =
        size + "px";

        p.style.left =
        Math.random() * 100 + "vw";

        p.style.top =
        Math.random() * 100 + "vh";

        p.style.animation =
        `floatUp ${Math.random() * 5 + 3}s linear infinite`;

        particleContainer.appendChild(p);
    }
}


// ================= INITIAL LOAD =================

createParticles();


// ================= AUTO CHECK =================

let lastParticleState =
localStorage.getItem("particlesEnabled");

setInterval(() => {

    const currentState =
    localStorage.getItem("particlesEnabled");

    if (currentState !== lastParticleState) {

        lastParticleState =
        currentState;

        createParticles();
    }

}, 500);

// DEVIL #1 - CLOUD GENERATOR

const cloudContainer = particleContainer;

function createCloud(){

    const cloud = document.createElement("div");

    // Random Cloud Type
    const type = Math.floor(Math.random() * 3) + 1;

    cloud.classList.add("cloud");
    cloud.classList.add("cloud" + type);

    // Random Size
    const size = Math.random() * 250 + 250;

    cloud.style.width = size + "px";
    cloud.style.height = size * 0.6 + "px";

    // Upper Sky Only
    cloud.style.top = Math.random() * 35 + "vh";

    // Right Side Spawn
    cloud.style.left = "110vw";

    // Random Opacity
    cloud.style.opacity = Math.random() * 0.4 + 0.2;

    // Random Depth
    const scale = Math.random() * 0.6 + 0.7;

    cloud.style.transform = `scale(${scale})`;

    // Random Speed
    const duration = Math.random() * 30 + 30;

    cloud.style.animationDuration = duration + "s";

    cloudContainer.appendChild(cloud);

    // Devil #2 (already made)
    setTimeout(() => {

        cloud.remove();

    }, duration * 1000);
}


// Initial Sky Fill
for(let i = 0; i < 8; i++){

    createCloud();

}


setInterval(createCloud, 2000);


const WeatherManager = {

    current: "sunny",
    maxClouds: 8,
    spawnRate: 5000,
    cloudBrightness: 100

};


function updateWeatherManager(apiWeather){

    switch(apiWeather){

        case "Clear":

            setWeather("sunny");
            break;

        case "Clouds":

            setWeather("cloudy");
            break;

        case "Rain":

            setWeather("rain");
            break;

        case "Thunderstorm":

            setWeather("storm");
            break;

        case "Mist":

        case "Fog":

            setWeather("fog");
            break;

        default:

            setWeather("sunny");
    }

}



function setWeather(weather){

    WeatherManager.current = weather;

    switch(weather){

        case "sunny":
            
            WeatherManager.cloudBrightness = 100;
            WeatherManager.maxClouds = 5;
            WeatherManager.spawnRate = 8000;
            break;

        case "cloudy":

            WeatherManager.cloudBrightness = 15;
            WeatherManager.maxClouds = 17;
            WeatherManager.spawnRate = 4000;
            break;

        case "rain":

            WeatherManager.cloudBrightness =
                Math.random() * 15 + 60; 
            WeatherManager.maxClouds = 20;
            WeatherManager.spawnRate = 2000;
            break;

        case "storm":

            WeatherManager.cloudBrightness =
            Math.random() * 20 + 40;
            WeatherManager.maxClouds = 30;
            WeatherManager.spawnRate = 1000;
            break;

        case "fog":

            WeatherManager.maxClouds = 15;
            WeatherManager.spawnRate = 3000;
            break;
    }

}







// Cloud Generation
setInterval(() => {

    const cloudCount =
    document.querySelectorAll(".cloud").length;

    if(cloudCount < WeatherManager.maxClouds){

        createCloud();

    }

}, WeatherManager.spawnRate);
